services:
  sshd:
    image: linuxserver/openssh-server:latest
    container_name: shelldroid-sshd-test
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=testpass
      - USER_NAME=testuser
      - SUDO_ACCESS=false
    ports:
      - "2222:2222"
